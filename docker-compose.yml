services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      # Override DATABASE_URL to use the mounted data volume
      DATABASE_URL: "file:/app/data/prod.db"
      COOKIE_PATH: "/app/cookies/cookies.txt"
    volumes:
      - ./data:/app/data
      - ./cookies:/app/cookies
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)throw 1})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    # Renew twice daily; exits cleanly on SIGTERM
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"
    restart: unless-stopped

volumes:
  certbot-certs:
  certbot-webroot:
